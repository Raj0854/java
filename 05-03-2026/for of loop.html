<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //Example with an Array:
        const colors = ["red", "green", "blue"];

        for (let color of colors) {
            console.log(color);
        }





        //Create an array named names with values: "jack", "rosie", "mira". Now, use a for...of loop to print each name of the array. However, while printing the name, change the first character to uppercase.
        const names = ["rahul", "avinash", "ashish"]
        for (i of names) {
            const name = i.charAt(0).toUpperCase() + i.slice(1) + " singh.";
            console.log(name);
        }
    </script>
</head>
